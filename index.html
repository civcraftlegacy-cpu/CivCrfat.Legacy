<!doctype html>
<html lang="es">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CivCraft Legacy</title>
    <style>
        body {
            background-color: #000;
            margin: 0;
            padding: 0;
            overflow: hidden;
            color: white;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #canvas {
            width: 100%;
            height: 100%;
        }

        #ui-layer {
            position: absolute;
            text-align: center;
            z-index: 10;
        }

        #start-button {
            padding: 20px 40px;
            font-size: 24px;
            cursor: pointer;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 8px;
        }

        #start-button:hover {
            background: #218838;
        }
    </style>
</head>

<body>
    <div id="ui-layer">
        <h1>CivCraft Legacy</h1>
        <button id="start-button">¡JUGAR AHORA!</button>
    </div>
    <canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>

    <script>
        window.config = {
            archive: "migranciudad.tar",
            fb_width: 1280,
            fb_height: 720,
            cdn: "https://pygame-web.github.io/cdn/0.9.3/",
            autorun: 1,
            ume_block: 0,
            user_canvas_resizer: 1
        };
    </script>

    <script type="text/python">
import sys
import os
import asyncio

async def wait_for_archive():
    """Esperar a que el tar se extraiga y ejecutar main.py"""
    max_tries = 30
    for attempt in range(max_tries):
        try:
            if os.path.exists('/main.py'):
                print("✓ main.py encontrado, ejecutando...")
                with open('/main.py', 'r') as f:
                    exec(f.read())
                return
        except Exception as e:
            print(f"Intento {attempt}: {e}")
        
        await asyncio.sleep(0.5)
    
    print("✗ Error: main.py no se encontró después de esperar")
    try:
        print("Archivos en /:", os.listdir('/'))
    except:
        print("No se pudo listar archivos en /")

asyncio.run(wait_for_archive())
    </script>

    <script>
        document.getElementById('start-button').onclick = () => {
            document.getElementById('ui-layer').style.display = 'none';
            const script = document.createElement('script');
            script.type = 'module';
            script.src = "https://pygame-web.github.io/cdn/0.9.3/pythons.js";
            script.dataset.python = "python3.12";
            script.dataset.os = "vtx,snd,gui";
            document.body.appendChild(script);
        };
    </script>
</body>

</html>
