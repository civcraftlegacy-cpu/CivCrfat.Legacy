<!doctype html>
<html lang="es">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CivCraft Legacy</title>

    <!-- 1. Cargar BrowserFS BIEN -->
    <script src="https://unpkg.com/browserfs" defer></script>

    <style>
        body {
            background-color: #000;
            margin: 0;
            padding: 0;
            overflow: hidden;
            color: white;
            font-family: sans-serif;
        }

        #canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        #status {
            position: absolute;
            width: 100%;
            top: 50%;
            text-align: center;
        }
    </style>
</head>

<body>
    <div id="status">Cargando CivCraft Legacy... (Haz clic aquí si tarda mucho)</div>
    <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="1"></canvas>

    <!-- 2. Configuración -->
    <script>
        window.config = {
            archive: "migranciudad.tar",
            fb_width: 1280,
            fb_height: 720,
            cdn: "https://pygame-web.github.io/cdn/0.9.3/",
            autorun: 1,
            ume_block: 0,
            user_canvas_resizer: 1
        }
    </script>

    <!-- 3. Cargar pygame-web DESPUÉS de todo -->
    <script>
        window.addEventListener("load", () => {
            const script = document.createElement("script");
            script.src = "https://pygame-web.github.io/cdn/0.9.3/pythons.js";
            script.type = "module";
            script.id = "site";
            script.setAttribute("data-python", "python3.12");
            script.setAttribute("data-os", "vtx,snd,gui");
            document.body.appendChild(script);
        });
    </script>

</body>

</html>
