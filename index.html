<!doctype html>
<html lang="es">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CivCraft Legacy</title>
    <script src="https://pygame-web.github.io/cdn/0.9.3/pythons.js" type="module" id="site" data-python="python3.12"
        data-os="vtx,snd,gui" async defer></script>
    <style>
        body {
            background-color: #7f7f7f;
            margin: 0;
            padding: 0;
        }

        #status {
            display: block;
            color: white;
            font-family: sans-serif;
            text-align: center;
            margin-top: 20px;
        }

        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
        }
    </style>
</head>

<body>
    <div id="status">Cargando CivCraft Legacy...</div>
    <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="1"></canvas>
    <script type="application/javascript">
        // Esta configuración es la que le dice a Pygbag qué archivo cargar
        window.config = {
            archive: "migranciudad.tar",
            fb_width: 1280,
            fb_height: 720,
            cdn: "https://pygame-web.github.io/cdn/0.9.3/",
            autorun: 1,      // <--- ESTO fuerzo el arranque automático
            user_canvas_resizer: 1 // Ayuda a que el canvas se adapte
        }
    </script>
</body>

</html>
