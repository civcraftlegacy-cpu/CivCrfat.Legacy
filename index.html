<!doctype html>
<html lang="es">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CivCraft Legacy</title>
    <script src="https://unpkg.com/browserfs@1.4.3/dist/browserfs.min.js"></script>
    <style>
        body {
            background-color: #000;
            margin: 0;
            padding: 0;
            overflow: hidden;
            color: white;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #canvas {
            width: 100%;
            height: 100%;
            display: none;
        }

        #ui-layer {
            text-align: center;
            z-index: 10;
        }

        #start-button {
            padding: 20px 40px;
            font-size: 24px;
            cursor: pointer;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        }

        #start-button:hover {
            background: #218838;
        }

        #status {
            margin-top: 20px;
            color: #aaa;
            font-size: 14px;
        }
    </style>
</head>

<body>
    <div id="ui-layer">
        <h1>CivCraft Legacy</h1>
        <button id="start-button">¡JUGAR AHORA!</button>
        <div id="status"></div>
    </div>

    <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="1"></canvas>

    <script>
        window.config = {
            archive: "migranciudad.tar",
            fb_width: 1280,
            fb_height: 720,
            cdn: "https://pygame-web.github.io/cdn/0.9.3/",
            autorun: 0,  // CAMBIAR A 0 - No auto-ejecutar sin archivo
            ume_block: 0,
            user_canvas_resizer: 1
        };
    </script>

    <script id="start-logic">
        const statusDiv = document.getElementById('status');

        function updateStatus(msg) {
            console.log(msg);
            statusDiv.textContent = msg;
        }

        document.getElementById('start-button').onclick = async () => {
            document.getElementById('ui-layer').style.display = 'none';
            document.getElementById('canvas').style.display = 'block';

            updateStatus("Descargando juego...");

            try {
                // Descargar el tar
                const tarResponse = await fetch("migranciudad.tar");
                const tarBuffer = await tarResponse.arrayBuffer();

                updateStatus("Montando archivo...");

                // Guardar en variable global para que Pygame lo encuentre
                window.gameArchive = new Uint8Array(tarBuffer);

                updateStatus("Cargando Pygame...");

                // Cargar Pygame Web
                const script = document.createElement('script');
                script.type = 'module';
                script.src = "https://pygame-web.github.io/cdn/0.9.3/pythons.js";
                script.dataset.python = "python3.12";
                script.dataset.os = "vtx,snd,gui";
                script.dataset.code = "import sys; exec(open('/main.py').read())";
                document.body.appendChild(script);

            } catch (error) {
                updateStatus("Error: " + error.message);
                console.error(error);
            }
        };
    </script>
</body>

</html>
