<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CivCraft Legacy</title>
    <script async src="https://cdn.jsdelivr.net/pyodide/v0.23.4/full/pyodide.js"></script>
    <style>
        body {
            background-color: #000;
            color: white;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #ui-layer {
            text-align: center;
            z-index: 10;
            position: absolute;
        }

        #start-button {
            padding: 20px 40px;
            font-size: 24px;
            cursor: pointer;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 8px;
        }

        #start-button:hover {
            background: #218838;
        }

        #output {
            color: #aaa;
            margin-top: 20px;
        }

        #canvas {
            display: none;
        }
    </style>
</head>

<body>
    <div id="ui-layer">
        <h1>CivCraft Legacy</h1>
        <button id="start-button">¡JUGAR AHORA!</button>
        <div id="output"></div>
    </div>
    <canvas id="canvas"></canvas>

    <script>
        async function main() {
            // Esperar a que Pyodide esté cargado
            while (typeof pyodide === 'undefined') {
                await new Promise(resolve => setTimeout(resolve, 100));
            }

            let py = await loadPyodide();

            document.getElementById('start-button').onclick = async () => {
                document.getElementById('ui-layer').style.display = 'none';
                document.getElementById('output').textContent = 'Cargando juego...';

                try {
                    // Descargar el tar
                    const response = await fetch('migranciudad.tar');
                    const arrayBuffer = await response.arrayBuffer();

                    // Guardar en el filesystem virtual de Pyodide
                    const fileData = new Uint8Array(arrayBuffer);
                    await pyodide.FS.writeFile('/tmp/migranciudad.tar', fileData);

                    // Extraer el tar
                    await pyodide.runPythonAsync(`
import tarfile
import os
os.chdir('/tmp')
with tarfile.open('migranciudad.tar', 'r') as tar:
    tar.extractall()
print('Archivo extraído correctamente')
                    `);

                    // Ejecutar main.py
                    const mainCode = await pyodide.FS.readFile('/tmp/main.py', { encoding: 'utf8' });
                    await pyodide.runPythonAsync(mainCode);

                } catch (error) {
                    document.getElementById('output').textContent = 'Error: ' + error.message;
                    console.error(error);
                }
            };
        }
        main();
    </script>
</body>

</html>
